aid: ethos-life
name: Ethos
description: >-
  Ethos is a US digital life insurance company headquartered in San Francisco,
  founded in 2016, offering term life, whole life, and indexed universal life
  policies through an online, mostly no-medical-exam application flow. Ethos
  operates as a technology-driven insurance agency, distributing policies
  underwritten by carriers such as Ameritas, Banner Life (Legal & General
  America), Protective, and TruStage. Coverage is available in 49 states and
  Washington, D.C., with term policies offered for 10, 15, 20, 30, and 40
  year durations and face amounts ranging from $15,000 to $3 million. The
  company has raised over $400 million from investors including Goldman
  Sachs, SoftBank, GV, Sequoia, and Accel, and is widely cited as one of
  the leading insurtech companies modernizing the life insurance buying
  experience. Ethos exposes a Partnership API that lets approved business
  partners embed quoting, identity validation, instant underwriting,
  application capture, billing, and signed policy issuance directly into
  their own products. The Partnership API uses bearer-token authentication
  tied to a partner API key and per-applicant session, and consolidates
  steps such as identity validation and quoting into combined endpoints to
  enable instant decisioning. There is no public, self-serve OpenAPI
  specification, SDK, or developer signup; access requires a partnership
  agreement with Ethos. Ethos's only material open-source footprint is the
  ethos-design-system React component library on GitHub.
